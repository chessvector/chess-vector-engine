[package]
name = "chess-vector-engine"
version = "0.1.0"
edition = "2021"
description = "A vector-based chess position analysis engine using similarity search"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/chess-vector-engine"
keywords = ["chess", "ai", "similarity", "vector", "manifold"]
categories = ["games", "algorithms"]

[lib]
name = "chess_vector_engine"
path = "src/lib.rs"

# Example binaries
[[bin]]
name = "demo"
path = "src/bin/demo.rs"

[[bin]]
name = "benchmark"
path = "src/bin/benchmark.rs"

[[bin]]
name = "analyze"
path = "src/bin/analyze.rs"

[[bin]]
name = "lsh_benchmark"
path = "src/bin/lsh_benchmark.rs"

[[bin]]
name = "manifold_demo"
path = "src/bin/manifold_demo.rs"

[[bin]]
name = "move_recommendation_demo"
path = "src/bin/move_recommendation_demo.rs"

[[bin]]
name = "train"
path = "src/bin/train.rs"

[[bin]]
name = "multithreading_demo"
path = "src/bin/multithreading_demo.rs"

[[bin]]
name = "tactical_training"
path = "src/bin/tactical_training.rs"

[[bin]]
name = "incremental_training_example"
path = "src/bin/incremental_training_example.rs"

[[bin]]
name = "incremental_puzzle_example"
path = "src/bin/incremental_puzzle_example.rs"

[[bin]]
name = "persistence_demo"
path = "src/bin/persistence_demo.rs"

[[bin]]
name = "persistence_test"
path = "src/bin/persistence_test.rs"

[[bin]]
name = "hybrid_evaluation_demo"
path = "src/bin/hybrid_evaluation_demo.rs"

[[bin]]
name = "self_play_training"
path = "src/bin/self_play_training.rs"

[[bin]]
name = "uci_engine"
path = "src/bin/uci_engine.rs"

[[bin]]
name = "nnue_pvs_demo"
path = "src/bin/nnue_pvs_demo.rs"

[[bin]]
name = "play_stockfish"
path = "src/bin/play_stockfish.rs"

[[bin]]
name = "performance_benchmark"
path = "src/bin/performance_benchmark.rs"

[[bin]]
name = "comprehensive_training"
path = "src/bin/comprehensive_training.rs"

[dependencies]
# Chess game logic
chess = "3.2"

# Numerical computing and arrays
ndarray = "0.16"
ndarray-rand = "0.15"

# Machine learning framework
candle-core = { version = "0.9", features = [] }
candle-nn = "0.9"

# Serialization for saving/loading models
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Random number generation
rand = "0.8"
fastrand = "2.0"

# Parallel processing
rayon = "1.8"

# Async runtime (for future parallel processing)
tokio = { version = "1.0", features = ["full"] }

# CLI and utilities
clap = { version = "4.5", features = ["derive"] }

# PGN parsing and Stockfish integration
pgn-reader = "0.22"
vampirc-uci = "0.11"

# Progress bars and indicators
indicatif = "0.17"

# CSV parsing for tactical puzzles
csv = "1.3"

# Date/time formatting
chrono = "0.4"

# Database persistence
rusqlite = { version = "0.32", features = ["bundled", "blob"] }
bincode = "1.3"

# Compression for fast training data
lz4_flex = "0.11"

[features]
default = []
cuda = ["candle-core/cuda"]
metal = ["candle-core/metal"]
gpu = ["cuda"]  # Default GPU feature to CUDA

[dev-dependencies]
criterion = "0.5"
tempfile = "3.8"